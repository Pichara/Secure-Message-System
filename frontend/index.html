<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero Round · Secure Messenger</title>
  <script defer src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    :root {
      --bg: #0b0f18;
      --surface: #121827;
      --surface-light: #1a2332;
      --border: #2a3442;
      --border-glow: #3e4a5e;
      --text: #edf2f7;
      --text-muted: #9aa4b8;
      --accent: #00c951;
      --accent-hover: #00a83e;
      --warn: #e67e22;
      --danger: #e03a3a;
      --info: #3b82f6;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
      min-height: 100vh;
    }

    .app {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* === SHARP CORNERS EVERYWHERE === */
    input, textarea, select, button, .card, .contact, .message, .status-badge {
      border-radius: 0 !important;
    }

    /* === TOP BAR === */
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .brand-block h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: var(--text);
      text-transform: uppercase;
    }

    .brand-block .muted {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .backend-control {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* === CARDS & CONTAINERS === */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    /* === FORMS === */
    .stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input, textarea {
      background: #0c111c;
      border: 1px solid var(--border);
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      width: 100%;
      transition: border 0.15s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    input::placeholder, textarea::placeholder {
      color: #5c6a7e;
    }

    /* === BUTTONS === */
    button {
      background: var(--surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 0 #0b0f18;
    }

    button:hover {
      background: #252f40;
      border-color: var(--border-glow);
    }

    button.primary {
      background: var(--accent);
      border-color: #00b045;
      color: #051a0c;
      font-weight: 700;
      box-shadow: 0 2px 0 #0a481e;
    }

    button.primary:hover {
      background: #00e05a;
      border-color: #00c951;
    }

    button.warn {
      background: var(--warn);
      border-color: #c05e0f;
      color: #1c0e00;
      font-weight: 700;
    }

    button.warn:hover {
      background: #f39c12;
    }

    button.danger {
      background: var(--danger);
      border-color: #b91c1c;
      color: white;
    }

    button.danger:hover {
      background: #f04747;
    }

    button.icon-btn {
      padding: 8px 12px;
    }

    /* === LAYOUT GRIDS === */
    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .chat-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }

    /* === SESSION & CONTACTS === */
    .session-summary {
      background: #0a0f18;
      padding: 10px 12px;
      border: 1px solid var(--border);
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 460px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .contact {
      background: #0c111c;
      border: 1px solid var(--border);
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 500;
      text-transform: lowercase;
      transition: 0.1s;
      border-left: 4px solid transparent;
    }

    .contact:hover {
      background: #1a2332;
      border-color: var(--border-glow);
    }

    .contact.active {
      border-left: 4px solid var(--accent);
      background: #142010;
      border-color: var(--accent);
    }

    /* === MESSAGE AREA === */
    .message-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 440px;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 16px;
    }

    .message {
      background: #0f1722;
      border: 1px solid var(--border);
      padding: 12px 14px;
      max-width: 90%;
    }

    .message.sent {
      align-self: flex-end;
      border-left: 4px solid #2563eb;
      background: #0f1a2c;
    }

    .message.recv {
      align-self: flex-start;
      border-left: 4px solid #16a34a;
      background: #0f1f15;
    }

    .message .meta {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }

    .message .body {
      word-break: break-word;
      font-size: 0.95rem;
    }

    /* === STATUS & UTILS === */
    .status-line {
      min-height: 22px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .auto-refresh-badge {
      background: #1e2a3a;
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0b3d9;
    }

    .hidden {
      display: none !important;
    }

    .muted {
      color: var(--text-muted);
    }

    .small {
      font-size: 0.75rem;
    }

    .flex-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    /* === RESPONSIVE === */
    @media (max-width: 800px) {
      .auth-grid, .chat-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
      body { padding: 12px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0c111c; }
    ::-webkit-scrollbar-thumb { background: #2a3442; border: 1px solid #1e2632; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand-block">
      <h1>ZERO ROUND</h1>
    </div>
    <div class="backend-control">
      <input id="backendUrl" style="width: 280px" placeholder="https://your-backend.com" value="http://localhost:9090">
      <button id="saveBackendBtn" class="icon-btn" title="Save backend URL">⟳ SAVE</button>
      <button id="logoutBtn" class="danger">⏻ LOGOUT</button>
    </div>
  </div>

  <!-- AUTH VIEW -->
  <section id="authView">
    <div class="auth-grid">
      <div class="card">
        <div class="card-header">REGISTER</div>
        <div class="stack">
          <input id="registerUsername" placeholder="Username" autocomplete="off">
          <input id="registerPassword" type="password" placeholder="Password">
          <input id="registerConfirm" type="password" placeholder="Confirm password">
          <button id="registerBtn" class="primary">CREATE ACCOUNT</button>
        </div>
        <div class="status-line" id="registerStatus"></div>
      </div>
      <div class="card">
        <div class="card-header">LOGIN</div>
        <div class="stack">
          <input id="loginUsername" placeholder="Username">
          <input id="loginPassword" type="password" placeholder="Password">
          <button id="loginBtn" class="primary">AUTHENTICATE</button>
        </div>
        <div class="status-line" id="loginStatus"></div>
      </div>
    </div>
  </section>

  <!-- CHAT VIEW -->
  <section id="chatView" class="hidden">
    <div class="chat-grid">
      <!-- LEFT PANEL -->
      <div>
        <div class="card">
          <div class="card-header">SESSION</div>
          <div id="sessionSummary" class="session-summary">Not logged in</div>
          <div class="stack">
            <input id="unlockPassword" type="password" placeholder="Unlock password">
            <button id="unlockBtn" class="warn">UNLOCK INBOX</button>
          </div>
          <div class="status-line" id="unlockStatus"></div>
        </div>

        <div class="card">
          <div class="card-header">CONTACTS</div>
          <div class="stack">
            <div class="flex-row">
              <input id="newContactUsername" placeholder="Username" style="flex:2">
              <button id="addContactBtn" style="flex:1">OPEN</button>
            </div>
          </div>
          <div style="margin-top: 16px;">
            <div class="contact-list" id="contactList"></div>
          </div>
          <div class="status-line small">click contact to load chat</div>
        </div>
      </div>

      <!-- RIGHT PANEL (CHAT) -->
      <div>
        <div class="card">
          <div class="card-header">
            <span id="chatTitle">CONVERSATION</span>
            <span class="auto-refresh-badge" id="refreshIndicator">AUTO 5s</span>
          </div>
          <div class="message-list" id="messageList"></div>
        </div>

        <div class="card">
          <div class="card-header">COMPOSE</div>
          <div class="stack">
            <textarea id="messageInput" placeholder="Type a secure message..."></textarea>
            <button id="sendBtn" class="primary">SEND ENCRYPTED</button>
          </div>
          <div class="status-line" id="sendStatus"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
  (function(){
    "use strict";

    // ---------- STATE ----------
    const state = {
      backendUrl: localStorage.getItem("sm_backend_url") || "http://localhost:9090",
      auth: JSON.parse(localStorage.getItem("sm_auth") || "{}"),
      keys: JSON.parse(localStorage.getItem("sm_keys") || "{}"),
      contacts: JSON.parse(localStorage.getItem("sm_contacts") || "[]"),
      history: JSON.parse(localStorage.getItem("sm_history") || "{}"),
      unlockedPrivateKey: null,
      currentChat: null,
    };

    const $ = (id) => document.getElementById(id);
    let pollTimer = null;
    let lastMessageCount = 0;

    // ---------- UTILS ----------
    function setStatus(id, msg) { $(id).textContent = msg || ""; }
    function saveState() {
      localStorage.setItem("sm_backend_url", state.backendUrl);
      localStorage.setItem("sm_auth", JSON.stringify(state.auth || {}));
      localStorage.setItem("sm_keys", JSON.stringify(state.keys || {}));
      localStorage.setItem("sm_contacts", JSON.stringify(state.contacts || []));
      localStorage.setItem("sm_history", JSON.stringify(state.history || {}));
    }

    function refreshTopBar() {
      $("backendUrl").value = state.backendUrl;
      $("logoutBtn").classList.toggle("hidden", !state.auth?.token);
    }

    function switchViews() {
      const loggedIn = !!state.auth?.token;
      $("authView").classList.toggle("hidden", loggedIn);
      $("chatView").classList.toggle("hidden", !loggedIn);
      if (loggedIn) {
        $("sessionSummary").textContent = 
          `USER: ${state.auth.username || "?"}\nBACKEND: ${state.backendUrl}\nPRIVATE KEY: ${state.keys?.encrypted_private_key ? 'STORED' : 'MISSING'}`;
        $("refreshIndicator").style.display = state.currentChat ? 'inline-block' : 'none';
      } else {
        stopPolling();
      }
      refreshTopBar();
    }

    // Base64 URL
    function b64UrlEncode(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }
    function b64UrlDecode(s) {
      s = s.replace(/-/g, "+").replace(/_/g, "/");
      while (s.length % 4) s += "=";
      const binary = atob(s);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    function textBytes(s) { return new TextEncoder().encode(s); }
    function textFromBytes(bytes) { return new TextDecoder().decode(bytes); }

    // Crypto helpers
    async function deriveAesKeyFromPassword(password, salt) {
      const material = await crypto.subtle.importKey("raw", textBytes(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", hash: "SHA-256", salt, iterations: 200000 },
        material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    }

    async function encryptPrivateKey(privateKeyBytes, password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const nonce = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveAesKeyFromPassword(password, salt);
      const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: nonce }, key, privateKeyBytes);
      return JSON.stringify({
        ciphertext: b64UrlEncode(new Uint8Array(ciphertext)),
        salt: b64UrlEncode(salt),
        nonce: b64UrlEncode(nonce),
      });
    }

    async function decryptPrivateKey(payloadStr, password) {
      const payload = JSON.parse(payloadStr);
      const salt = b64UrlDecode(payload.salt);
      const nonce = b64UrlDecode(payload.nonce);
      const ciphertext = b64UrlDecode(payload.ciphertext);
      const key = await deriveAesKeyFromPassword(password, salt);
      const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ciphertext);
      return new Uint8Array(plaintext);
    }

    async function deriveMessageAesKey(sharedSecret, salt) {
      const keyMaterial = await crypto.subtle.importKey("raw", sharedSecret, "HKDF", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "HKDF", hash: "SHA-256", salt, info: textBytes("secure-message-ecdh") },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    }

    async function encryptMessage(plaintext, recipientPublicKeyB64) {
      const recipientPublicKey = b64UrlDecode(recipientPublicKeyB64);
      const eph = nacl.box.keyPair();
      const sharedSecret = nacl.scalarMult(eph.secretKey, recipientPublicKey);
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const aesKey = await deriveMessageAesKey(sharedSecret, salt);
      const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, textBytes(plaintext));
      return {
        encrypted_key: JSON.stringify({ epk: b64UrlEncode(eph.publicKey), salt: b64UrlEncode(salt) }),
        ciphertext: b64UrlEncode(new Uint8Array(ciphertext)),
        iv: b64UrlEncode(iv),
      };
    }

    async function decryptMessage(ciphertextB64, ivB64, encryptedKeyPayloadStr, privateKeyBytes) {
      const payload = JSON.parse(encryptedKeyPayloadStr);
      const ephPublicKey = b64UrlDecode(payload.epk);
      const salt = b64UrlDecode(payload.salt);
      const iv = b64UrlDecode(ivB64);
      const ciphertext = b64UrlDecode(ciphertextB64);
      const sharedSecret = nacl.scalarMult(privateKeyBytes, ephPublicKey);
      const aesKey = await deriveMessageAesKey(sharedSecret, salt);
      const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, ciphertext);
      return textFromBytes(new Uint8Array(plaintext));
    }

    // API
    async function api(path, options = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
      if (state.auth?.token) headers.Authorization = `Bearer ${state.auth.token}`;
      const res = await fetch(`${state.backendUrl}${path}`, {
        method: options.method || "GET", headers, body: options.body,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) {
        const err = new Error(typeof data === "string" ? data : JSON.stringify(data));
        err.status = res.status; err.payload = data; throw err;
      }
      return data;
    }

    // ---------- POLLING (AUTO REFRESH) ----------
    function stopPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
      $("refreshIndicator").style.display = 'none';
    }

    function startPolling(username) {
      stopPolling();
      if (!username || !state.auth?.token) return;
      $("refreshIndicator").style.display = 'inline-block';
      pollTimer = setInterval(async () => {
        if ($("chatView").classList.contains("hidden")) return;
        if (state.currentChat !== username) { stopPolling(); return; }
        try {
          await silentRefresh(username);
        } catch (e) { console.warn("poll error", e); }
      }, 5000);
    }

    async function silentRefresh(username) {
      const messages = await api(`/api/messages?with=${encodeURIComponent(username)}`);
      messages.sort((a, b) => String(a.created_at || "").localeCompare(String(b.created_at || "")));
      const prepared = [];
      for (const msg of messages) {
        const direction = msg.recipient === state.auth.username ? "recv" : "sent";
        let plaintext = "";
        if (direction === "recv") {
          if (!state.unlockedPrivateKey) plaintext = "[inbox locked]";
          else {
            try { plaintext = await decryptMessage(msg.ciphertext, msg.iv, msg.encrypted_key, state.unlockedPrivateKey); }
            catch { plaintext = "[decryption failed]"; }
          }
        } else {
          plaintext = state.history[String(msg.id)] || "[sent]";
        }
        prepared.push({ ...msg, direction, plaintext });
      }
      // Only re-render if message count changed (simple diff)
      const currentCount = document.querySelectorAll('.message').length;
      if (prepared.length !== currentCount) {
        renderMessages(prepared);
      } else {
        // still could be content change, but for simplicity re-render anyway
        renderMessages(prepared);
      }
    }

    // ---------- RENDERING ----------
    function renderMessages(messages) {
      const box = $("messageList");
      box.innerHTML = "";
      if (!messages.length) {
        box.innerHTML = '<div class="muted" style="padding:16px;text-align:center">— no messages —</div>';
        return;
      }
      for (const msg of messages) {
        const div = document.createElement("div");
        div.className = `message ${msg.direction}`;
        const meta = document.createElement("div");
        meta.className = "meta";
        const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
        meta.textContent = `${time}  •  ${msg.sender} → ${msg.recipient}`;
        const body = document.createElement("div");
        body.className = "body";
        body.textContent = msg.plaintext;
        div.append(meta, body);
        box.appendChild(div);
      }
      box.scrollTop = box.scrollHeight;
    }

    function renderContacts() {
      const list = $("contactList");
      list.innerHTML = "";
      for (const username of state.contacts) {
        const div = document.createElement("div");
        div.className = "contact" + (state.currentChat === username ? " active" : "");
        div.textContent = `@${username}`;
        div.onclick = () => {
          state.currentChat = username;
          saveState();
          renderContacts();
          loadConversation(username);
        };
        list.appendChild(div);
      }
    }

    // ---------- CONVERSATION LOAD ----------
    async function loadConversation(username) {
      stopPolling();
      $("chatTitle").textContent = `>>> ${username}`;
      setStatus("sendStatus", "loading...");
      try {
        const messages = await api(`/api/messages?with=${encodeURIComponent(username)}`);
        messages.sort((a, b) => String(a.created_at || "").localeCompare(String(b.created_at || "")));
        const prepared = [];
        for (const msg of messages) {
          const direction = msg.recipient === state.auth.username ? "recv" : "sent";
          let plaintext = "";
          if (direction === "recv") {
            if (!state.unlockedPrivateKey) plaintext = "[inbox locked]";
            else {
              try { plaintext = await decryptMessage(msg.ciphertext, msg.iv, msg.encrypted_key, state.unlockedPrivateKey); }
              catch { plaintext = "[decryption failed]"; }
            }
          } else {
            plaintext = state.history[String(msg.id)] || "[sent]";
          }
          prepared.push({ ...msg, direction, plaintext });
        }
        renderMessages(prepared);
        setStatus("sendStatus", "");
        startPolling(username);
      } catch (e) {
        renderMessages([]);
        setStatus("sendStatus", `load failed: ${e.payload?.error || e.message}`);
      }
    }

    // ---------- EVENT HANDLERS ----------
    async function register() {
      setStatus("registerStatus", "creating...");
      const u = $("registerUsername").value.trim();
      const p = $("registerPassword").value;
      const c = $("registerConfirm").value;
      if (!u || !p) return setStatus("registerStatus", "fill all fields");
      if (p !== c) return setStatus("registerStatus", "passwords mismatch");
      if (!nacl) return setStatus("registerStatus", "nacl missing");
      try {
        const kp = nacl.box.keyPair();
        const publicKey = b64UrlEncode(kp.publicKey);
        const encrypted = await encryptPrivateKey(kp.secretKey, p);
        await api("/api/register", { method:"POST", body: JSON.stringify({
          username: u, password: p, public_key: publicKey, encrypted_private_key: encrypted
        })});
        setStatus("registerStatus", "✓ registered. login now.");
        $("loginUsername").value = u; $("loginPassword").value = p;
      } catch(e) { setStatus("registerStatus", `error: ${e.payload?.message || e.message}`); }
    }

    async function login() {
      setStatus("loginStatus", "authenticating...");
      const u = $("loginUsername").value.trim();
      const p = $("loginPassword").value;
      if(!u||!p) return setStatus("loginStatus","credentials required");
      try {
        const auth = await api("/api/login", { method:"POST", body: JSON.stringify({username:u,password:p}) });
        state.auth = { token: auth.token, username: u };
        const me = await api("/api/me");
        state.keys = { public_key: me.public_key, encrypted_private_key: me.encrypted_private_key };
        saveState();
        switchViews();
        renderContacts();
        setStatus("loginStatus","");
      } catch(e) { setStatus("loginStatus", `login failed: ${e.payload?.error || e.message}`); }
    }

    async function logout() {
      stopPolling();
      try { if(state.auth?.token) await api("/api/logout", {method:"POST"}); } catch{}
      state.auth = {}; state.keys = {}; state.unlockedPrivateKey = null; state.currentChat = null;
      saveState(); switchViews(); renderContacts(); renderMessages([]);
    }

    async function unlockInbox() {
      const pwd = $("unlockPassword").value;
      if(!pwd) return setStatus("unlockStatus","enter password");
      try {
        state.unlockedPrivateKey = await decryptPrivateKey(state.keys.encrypted_private_key, pwd);
        $("unlockPassword").value = "";
        setStatus("unlockStatus","✓ inbox unlocked");
        if(state.currentChat) loadConversation(state.currentChat);
      } catch { setStatus("unlockStatus","decryption failed"); }
    }

    async function addContact() {
      const username = $("newContactUsername").value.trim();
      if(!username) return;
      if(!state.contacts.includes(username)) state.contacts.push(username);
      state.currentChat = username;
      $("newContactUsername").value = "";
      saveState(); renderContacts();
      await loadConversation(username);
    }

    async function sendMessage() {
      const to = state.currentChat;
      const plain = $("messageInput").value.trim();
      if(!to) return setStatus("sendStatus","no contact selected");
      if(!plain) return setStatus("sendStatus","empty message");
      try {
        setStatus("sendStatus","encrypting...");
        const keyData = await api(`/api/users/${encodeURIComponent(to)}/public-key`);
        const enc = await encryptMessage(plain, keyData.public_key);
        const result = await api("/api/messages", { method:"POST", body: JSON.stringify({
          recipient: to, encrypted_key: enc.encrypted_key, ciphertext: enc.ciphertext, iv: enc.iv
        })});
        if(result?.id) { state.history[String(result.id)] = plain; saveState(); }
        $("messageInput").value = "";
        await loadConversation(to);
      } catch(e) { setStatus("sendStatus", `send failed: ${e.payload?.error || e.message}`); }
    }

    function saveBackendUrl() {
      state.backendUrl = $("backendUrl").value.trim().replace(/\/+$/, "") || "http://localhost:9090";
      saveState(); refreshTopBar();
      setStatus("loginStatus", `backend: ${state.backendUrl}`);
    }

    // ---------- INIT ----------
    window.addEventListener('load', () => {
      $("registerBtn").onclick = register;
      $("loginBtn").onclick = login;
      $("logoutBtn").onclick = logout;
      $("unlockBtn").onclick = unlockInbox;
      $("addContactBtn").onclick = addContact;
      $("sendBtn").onclick = sendMessage;
      $("saveBackendBtn").onclick = saveBackendUrl;
      refreshTopBar();
      switchViews();
      renderContacts();
      if(state.currentChat) loadConversation(state.currentChat);
    });
  })();
</script>
</body>
</html>
