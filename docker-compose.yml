services:
  db:
    image: postgres:16
    container_name: secure-message-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secure_message
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure-message-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/secure_message
      PORT: "8080"
      BOOTSTRAP_ADMIN_USERNAME: "${BOOTSTRAP_ADMIN_USERNAME}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD}"
      BOOTSTRAP_ADMIN_PUBLIC_KEY: "${BOOTSTRAP_ADMIN_PUBLIC_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}"
      BOOTSTRAP_ADMIN_ENCRYPTED_PRIVATE_KEY: '${BOOTSTRAP_ADMIN_ENCRYPTED_PRIVATE_KEY:-{"ciphertext":"","salt":"","nonce":""}}'
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
